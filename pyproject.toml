[tool.black]
line-length = 88
exclude = '''
/(\.venv|\.venv_intel|venv|build|dist|\.git|\.eggs|archive|vendor|prism\.egg-info|prism-studio\.egg-info|docs/_build)/
'''

[tool.coverage.run]
source = ["src"]
omit = [
    "tests/*",
    "scripts/*",
    "docs/*",
    "vendor/*",
    ".venv/*",
    ".venv_intel/*",
    "src/maintenance/*",
    "src/bids_file_deleter.py",
    "src/runtime_dependencies.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "\\.\\.\\.",
]
show_missing = true
