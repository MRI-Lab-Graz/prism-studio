[pytest]
testpaths = tests
pythonpath = . app app/src
norecursedirs = scripts demo examples prism_demo consistent_test_dataset .venv .venv_intel venv env
; Windows CI runs pytest through Git Bash for command-syntax consistency
; across OSes. Git Bash's MSYS2 pipe/pty emulation confuses pytest's default
; OS-level file-descriptor capture, crashing teardown with "I/O operation on
; closed file" before any test result is reported. sys-level capture avoids
; the raw fd duplication entirely and works the same on all three OSes.
addopts = --capture=sys
