  <text x="655" y="183" text-anchor="middle" fill="#1a5276" font-size="15">Check sample values</text>
  <text x="671" y="204" text-anchor="middle" fill="#8a5a00" font-size="15" font-weight="700">Confirm the demographics look right</text>

  <rect x="494" y="278" width="354" height="150" rx="18" fill="#ffffff" stroke="#d6dde5" stroke-width="1.5"/>
  <rect x="494" y="278" width="354" height="38" rx="18" fill="#f4b400"/>
  <circle cx="532" cy="297" r="16" fill="#ffffff" fill-opacity="0.22"/>
  <text x="532" y="303" text-anchor="middle" fill="#2f2a15" font-size="18" font-weight="700">3</text>
  <text x="671" y="303" text-anchor="middle" fill="#2f2a15" font-size="18" font-weight="700">Add extras if needed</text>
  <rect x="548" y="338" width="86" height="32" rx="16" fill="#fff4cc" stroke="#ebcf6f"/>
  <text x="591" y="359" text-anchor="middle" fill="#8a5a00" font-size="16" font-weight="700">site</text>
  <rect x="648" y="338" width="102" height="32" rx="16" fill="#fff4cc" stroke="#ebcf6f"/>
  <text x="699" y="359" text-anchor="middle" fill="#8a5a00" font-size="16" font-weight="700">group</text>
  <circle cx="590" cy="392" r="24" fill="#27ae60"/>
  <path d="M590 378 v28 M576 392 h28" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <text x="706" y="388" text-anchor="middle" fill="#1a5276" font-size="16" font-weight="700">Descriptions</text>
  <text x="706" y="408" text-anchor="middle" fill="#5f6c7a" font-size="15">and value labels</text>

  <rect x="52" y="278" width="354" height="150" rx="18" fill="#ffffff" stroke="#d6dde5" stroke-width="1.5"/>
  <rect x="52" y="278" width="354" height="38" rx="18" fill="#1e8449"/>
  <circle cx="90" cy="297" r="16" fill="#ffffff" fill-opacity="0.18"/>
  <text x="90" y="303" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">4</text>
  <text x="230" y="303" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">Create participant files</text>
  <path d="M120 344 h86 a10 10 0 0 1 10 10 v44 a10 10 0 0 1 -10 10 h-86 z" fill="#eef5fb" stroke="#c9d9e6" stroke-width="2"/>
  <path d="M120 344 l20 0 l14 14 h62" fill="none" stroke="#c9d9e6" stroke-width="2.5"/>
  <text x="169" y="379" text-anchor="middle" fill="#1a5276" font-size="18" font-weight="700">.tsv</text>
  <path d="M246 344 h86 a10 10 0 0 1 10 10 v44 a10 10 0 0 1 -10 10 h-86 z" fill="#eafaf1" stroke="#b8e0c8" stroke-width="2"/>
  <path d="M246 344 l20 0 l14 14 h62" fill="none" stroke="#b8e0c8" stroke-width="2.5"/>
  <text x="295" y="379" text-anchor="middle" fill="#1e8449" font-size="18" font-weight="700">.json</text>
  <text x="230" y="358" text-anchor="middle" fill="#1a5276" font-size="15" font-weight="700">participants</text>
  <text x="356" y="358" text-anchor="middle" fill="#1e8449" font-size="15" font-weight="700">participants</text>
  <text x="230" y="414" text-anchor="middle" fill="#5f6c7a" font-size="15">Saved once at the dataset root</text>

  <text x="450" y="456" text-anchor="middle" fill="#566573" font-size="13">Use this tab for dataset-level demographics, not for per-question survey responses.</text>
</svg>