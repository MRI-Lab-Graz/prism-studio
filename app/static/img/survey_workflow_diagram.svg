<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif" font-size="14">
  <defs>
    <marker id="survey-arrow-right" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#27ae60"/>
    </marker>
    <marker id="survey-arrow-down" markerWidth="10" markerHeight="8" refX="5" refY="7" orient="auto">
      <polygon points="0 0, 10 0, 5 8" fill="#27ae60"/>
    </marker>
  </defs>

  <rect width="900" height="500" rx="12" fill="#f4f7fb"/>
  <text x="450" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1a3a5c">Survey conversion workflow for beginners</text>

  <line x1="405" y1="148" x2="472" y2="148" stroke="#27ae60" stroke-width="4" marker-end="url(#survey-arrow-right)"/>
  <line x1="662" y1="214" x2="662" y2="254" stroke="#27ae60" stroke-width="4" marker-end="url(#survey-arrow-down)"/>
  <line x1="495" y1="362" x2="428" y2="362" stroke="#27ae60" stroke-width="4" marker-end="url(#survey-arrow-right)"/>

  <rect x="52" y="64" width="354" height="150" rx="18" fill="#ffffff" stroke="#d6dde5" stroke-width="1.5"/>
  <rect x="52" y="64" width="354" height="38" rx="18" fill="#1a5276"/>
  <circle cx="90" cy="83" r="16" fill="#ffffff" fill-opacity="0.18"/>
