  <text x="230" y="89" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">Upload responses</text>
  <rect x="86" y="124" width="144" height="66" rx="10" fill="#eef5fb" stroke="#c9d9e6"/>
  <rect x="86" y="124" width="144" height="18" fill="#2874a6"/>
  <line x1="126" y1="142" x2="126" y2="190" stroke="#c9d9e6"/>
  <line x1="176" y1="142" x2="176" y2="190" stroke="#c9d9e6"/>
  <text x="106" y="137" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">id</text>
  <text x="151" y="137" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">Q1</text>
  <text x="203" y="137" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">Q2</text>
  <text x="106" y="160" text-anchor="middle" fill="#1a3a5c" font-size="12">001</text>
  <text x="151" y="160" text-anchor="middle" fill="#1a5276" font-size="12">3</text>
  <text x="203" y="160" text-anchor="middle" fill="#1a5276" font-size="12">4</text>
  <text x="106" y="180" text-anchor="middle" fill="#1a3a5c" font-size="12">002</text>
  <text x="151" y="180" text-anchor="middle" fill="#1a5276" font-size="12">2</text>
  <text x="203" y="180" text-anchor="middle" fill="#1a5276" font-size="12">5</text>
  <text x="300" y="138" fill="#5f6c7a" font-size="14">Accepts</text>
  <text x="300" y="162" fill="#1a5276" font-size="15" font-weight="700">Excel, CSV, TSV,</text>
  <text x="300" y="184" fill="#1a5276" font-size="15" font-weight="700">or LimeSurvey</text>

  <rect x="494" y="64" width="354" height="150" rx="18" fill="#ffffff" stroke="#d6dde5" stroke-width="1.5"/>
  <rect x="494" y="64" width="354" height="38" rx="18" fill="#2874a6"/>
  <circle cx="532" cy="83" r="16" fill="#ffffff" fill-opacity="0.18"/>
  <text x="532" y="89" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">2</text>
  <text x="671" y="89" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">Match main settings</text>
  <rect x="548" y="124" width="246" height="30" rx="15" fill="#eafaf1" stroke="#b8e0c8"/>
  <text x="671" y="144" text-anchor="middle" fill="#1e8449" font-size="16" font-weight="700">participant_id column</text>
  <rect x="548" y="164" width="208" height="28" rx="14" fill="#fff4cc" stroke="#ebcf6f"/>
  <text x="652" y="183" text-anchor="middle" fill="#8a5a00" font-size="16" font-weight="700">session label</text>
  <text x="671" y="204" text-anchor="middle" fill="#1a5276" font-size="15" font-weight="700">Optional: language or ID map</text>

  <rect x="494" y="278" width="354" height="150" rx="18" fill="#ffffff" stroke="#d6dde5" stroke-width="1.5"/>
