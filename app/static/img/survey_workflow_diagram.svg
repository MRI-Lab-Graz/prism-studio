  <text x="671" y="303" text-anchor="middle" fill="#2f2a15" font-size="18" font-weight="700">Preview first</text>
  <circle cx="590" cy="382" r="28" fill="#fff4cc" stroke="#ebcf6f" stroke-width="2"/>
  <circle cx="590" cy="382" r="11" fill="#8a5a00"/>
  <text x="706" y="360" text-anchor="middle" fill="#1a5276" font-size="16" font-weight="700">Check filenames</text>
  <text x="706" y="386" text-anchor="middle" fill="#1a5276" font-size="16" font-weight="700">Check values</text>
  <text x="706" y="412" text-anchor="middle" fill="#1e8449" font-size="16" font-weight="700">Dry-run only</text>

  <rect x="52" y="278" width="354" height="150" rx="18" fill="#ffffff" stroke="#d6dde5" stroke-width="1.5"/>
  <rect x="52" y="278" width="354" height="38" rx="18" fill="#1e8449"/>
  <circle cx="90" cy="297" r="16" fill="#ffffff" fill-opacity="0.18"/>
  <text x="90" y="303" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">4</text>
  <text x="230" y="303" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">Create survey files</text>
  <path d="M108 344 h234 a12 12 0 0 1 12 12 v52 a12 12 0 0 1 -12 12 h-234 a12 12 0 0 1 -12 -12 v-52 a12 12 0 0 1 12 -12 z" fill="#eef5fb" stroke="#c9d9e6" stroke-width="2"/>
  <text x="230" y="375" text-anchor="middle" fill="#1a5276" font-size="20" font-weight="700">sub-01 / ses-01 / survey /</text>
  <text x="230" y="401" text-anchor="middle" fill="#1a5276" font-size="16">*_survey.tsv + .json</text>

  <rect x="120" y="448" width="660" height="32" rx="16" fill="#fff7db" stroke="#ead79a" stroke-width="2"/>
  <text x="450" y="469" text-anchor="middle" fill="#8a5a00" font-size="15" font-weight="700">If visits are still in column names like T1_Q1 or T2_Q1, use File Management &gt; Wide to Long first.</text>
</svg>