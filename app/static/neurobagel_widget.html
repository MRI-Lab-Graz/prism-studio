window.getNeurobagelMappingForColumn = function(colData) {
  if (!colData) return null;

  const standardized = String(colData.standardized_variable || '').trim().toLowerCase();
  const termUrl = String(colData.term_url || '').trim();
  const termSuffix = termUrl.toLowerCase().startsWith('nb:')
    ? termUrl.slice(3).trim().toLowerCase()
    : '';

  return Object.values(window.neurobagelCommonMappings).find(mapping => {
    if (!mapping) return false;

    const mappingStandardized = String(mapping.standardized_variable || '').trim().toLowerCase();
    const mappingTerm = String(mapping.term_url || '').trim().toLowerCase();
    const mappingTermSuffix = mappingTerm.startsWith('nb:') ? mappingTerm.slice(3) : '';

    if (standardized && mappingStandardized === standardized) return true;
    if (termSuffix && mappingTermSuffix === termSuffix) return true;
    return false;
  }) || null;
};

window.getManualLevelKeyMapping = function(colData, levelKey) {
  if (!colData || !colData.level_key_mappings || typeof colData.level_key_mappings !== 'object') {
    return null;
  }

  const manual = colData.level_key_mappings[String(levelKey || '').trim()];
  return manual ? String(manual).trim() : null;
};

window.getResolvedCanonicalLevelKey = function(colData, mapping, levelKey, levelData) {
  const manualKey = window.getManualLevelKeyMapping(colData, levelKey);
  if (manualKey && mapping && mapping.levels && Object.prototype.hasOwnProperty.call(mapping.levels, manualKey)) {
    return manualKey;
  }

  return window.resolveCanonicalLevelKey(mapping, levelKey, levelData);
};

window.resolveCanonicalLevelKey = function(mapping, levelKey, levelData) {
  if (!mapping || !mapping.levels) return null;

  const keyNorm = String(levelKey || '').trim().toLowerCase();
  const labelNorm = String((levelData && levelData.label) ? levelData.label : '').trim().toLowerCase();

  if (!keyNorm && !labelNorm) return null;

  // Direct key match (case-insensitive).
  for (const canonicalKey of Object.keys(mapping.levels)) {
    if (canonicalKey.toLowerCase() === keyNorm) {
      return canonicalKey;
    }
  }

  // Label/alias match.
  for (const [canonicalKey, mappingLevel] of Object.entries(mapping.levels)) {
    const candidates = [
      canonicalKey,
      mappingLevel && mappingLevel.label ? mappingLevel.label : '',
      ...(Array.isArray(mappingLevel && mappingLevel.aliases) ? mappingLevel.aliases : []),
    ]
      .map(v => String(v || '').trim().toLowerCase())
      .filter(Boolean);

    if ((keyNorm && candidates.includes(keyNorm)) || (labelNorm && candidates.includes(labelNorm))) {
      return canonicalKey;
    }
  }

  return null;
};

window.canonicalizeCategoricalLevels = function(colData, mapping) {
  if (!colData || !mapping || !mapping.levels || !colData.levels || typeof colData.levels !== 'object') {
    return;
  }

  if (!colData.level_key_mappings || typeof colData.level_key_mappings !== 'object') {
    colData.level_key_mappings = {};
  }

  // Preserve source keys as-is (e.g., "1" stays "1", not renamed to "R").
  // Only enrich label and URI from the vocab mapping without renaming.
  // participants.json Levels will use the actual source data values as keys.
  for (const [sourceKey, sourceData] of Object.entries(colData.levels)) {
    if (!sourceData || typeof sourceData !== 'object') {
      continue;
    }

    const canonicalKey = window.getResolvedCanonicalLevelKey(colData, mapping, sourceKey, sourceData);
    if (canonicalKey && mapping.levels[canonicalKey]) {
      const mappingLevel = mapping.levels[canonicalKey];
      const manualCanonicalKey = window.getManualLevelKeyMapping(colData, sourceKey);
      const hasManualMapping = !!manualCanonicalKey;
      const sourceLabel = String((sourceData.label ?? '')).trim();
      const normalizedSourceKey = String(sourceKey || '').trim();

      if (!sourceLabel || sourceLabel === normalizedSourceKey) {
        sourceData.label = mappingLevel.label || sourceData.label;
      }

      // Manual selection should always drive the URI, while auto-resolution
      // only backfills URI when there is no existing value.
      if (hasManualMapping || !sourceData.uri) {
        sourceData.uri = mappingLevel.uri || null;
      }
    }
  }
};

window.mapObservedLevelToCanonicalKey = function(colName, sourceKey, canonicalKey) {
  const colData = window.neurobagelWidgetState?.allColumns?.[colName];
  if (!colData || !colData.levels || !Object.prototype.hasOwnProperty.call(colData.levels, sourceKey)) {
    return;
  }

  const mapping = window.getNeurobagelMappingForColumn(colData);
  if (!mapping || !mapping.levels || !Object.prototype.hasOwnProperty.call(mapping.levels, canonicalKey)) {
    return;
  }

  if (!colData.level_key_mappings || typeof colData.level_key_mappings !== 'object') {
    colData.level_key_mappings = {};
  }

  colData.level_key_mappings[sourceKey] = canonicalKey;

  // Apply the chosen canonical mapping immediately for predictable UI feedback.
  const sourceLevel = colData.levels[sourceKey];
  const mappingLevel = mapping.levels[canonicalKey];
  if (sourceLevel && mappingLevel) {
    const currentLabel = String((sourceLevel.label ?? '')).trim();
    const normalizedSourceKey = String(sourceKey || '').trim();
    if (!currentLabel || currentLabel === normalizedSourceKey) {
      sourceLevel.label = mappingLevel.label || sourceLevel.label;
    }
    sourceLevel.uri = mappingLevel.uri || null;
  }

  window.canonicalizeCategoricalLevels(colData, mapping);
  window.renderNeurobagelEditor(colName, colData);
  window.renderNeurobagelSidebar();
};

window.applyNeurobagelEnrichment = function(colName) {
  const concept = document.getElementById(`nb-map-${colName}`).value;
  if (!concept) return;
  
  const mapping = window.neurobagelCommonMappings[concept];
  if (!mapping) return;
  
  const colData = window.neurobagelWidgetState.allColumns[colName];
  
  // Apply the enrichment
  colData.standardized_variable = mapping.standardized_variable;
  colData.term_url = mapping.term_url;
  colData.label = concept;
  if (mapping.data_type) colData.data_type = mapping.data_type;
  if (mapping.description && !colData.description) colData.description = mapping.description;
  if (mapping.unit) {
    colData.unit = mapping.unit;
    console.log(`✅ Applied unit "${mapping.unit}" to ${colName}`);
  }
  
  // For categorical, try to match existing level keys
  if (mapping.levels && colData.levels) {
    for (const [key, mappingLevel] of Object.entries(mapping.levels)) {
      // Direct match
      if (colData.levels[key]) {
        colData.levels[key].label = mappingLevel.label;
        colData.levels[key].uri = mappingLevel.uri;
      } else {
        // Case-insensitive match or label match
        const existingKey = Object.keys(colData.levels).find(k => 
          k.toLowerCase() === key.toLowerCase() || 
          (colData.levels[k].label && colData.levels[k].label.toLowerCase() === mappingLevel.label.toLowerCase())
        );
        if (existingKey) {
          colData.levels[existingKey].label = mappingLevel.label;
          colData.levels[existingKey].uri = mappingLevel.uri;
        }
      }
    }

    // Rewrite dataset-specific level keys to canonical mapping keys.
    window.canonicalizeCategoricalLevels(colData, mapping);
  }
  
  console.log(`✅ Applied ${concept} enrichment to ${colName}`);
  window.renderNeurobagelEditor(colName, colData);
  
  // Re-render sidebar only (don't re-fetch data, preserves enrichments)
  window.renderNeurobagelSidebar();
};

window.clearNeurobagelEnrichment = function(colName) {
  const colData = window.neurobagelWidgetState.allColumns[colName];
  if (!colData) return;

  colData.standardized_variable = null;
  colData.term_url = null;
  colData.label = null;

  if (colData.levels) {
    for (const levelData of Object.values(colData.levels)) {
      if (levelData && Object.prototype.hasOwnProperty.call(levelData, 'uri')) {
        levelData.uri = null;
      }
    }
  }

  window.renderNeurobagelEditor(colName, colData);
  window.renderNeurobagelSidebar();
};

window.removeNeurobagelVariable = async function(colName) {
  const removeHandler = window.removeAdditionalParticipantVariable;
  if (typeof removeHandler === 'function') {
    try {
      await removeHandler(colName);
    } catch (error) {
      console.warn(`Could not persist removal of ${colName}:`, error);
    }
  }

  if (window.neurobagelWidgetState && window.neurobagelWidgetState.allColumns) {
    delete window.neurobagelWidgetState.allColumns[colName];
  }
  if (window.existingParticipantsData && typeof window.existingParticipantsData === 'object') {
    delete window.existingParticipantsData[colName];
  }
  if (window.participantsTsvData && typeof window.participantsTsvData === 'object') {
    delete window.participantsTsvData[colName];
  }

  window.neurobagelWidgetState.selectedColumn = null;
  window.renderNeurobagelSidebar();

  const editor = document.getElementById('neurobagelEditor');
  if (editor) {
    editor.innerHTML = `
      <div class="nb-empty-state">
        <p>Select a column from the sidebar to annotate</p>
      </div>
    `;
  }
};

window.addNeurobagelLevel = function(colName) {
  const colData = window.neurobagelWidgetState.allColumns[colName];
  if (!colData) return;
  if (!colData.levels || typeof colData.levels !== 'object') {
    colData.levels = {};
  }

  const levelKey = window.prompt('Level value (e.g., 0, 1, CTRL):');
  if (levelKey === null) return;
  const normalizedKey = String(levelKey).trim();
  if (!normalizedKey) return;

  if (!colData.levels[normalizedKey]) {
    colData.levels[normalizedKey] = {
      label: normalizedKey,
      description: '',
      uri: null,
    };
  }

  window.renderNeurobagelEditor(colName, colData);
};

window.syncNeurobagelActiveEditorToState = function() {
  const selectedCol = window.neurobagelWidgetState?.selectedColumn;
  if (!selectedCol) return;

  const colData = window.neurobagelWidgetState?.allColumns?.[selectedCol];
  if (!colData) return;

  const descField = document.getElementById(`nb-desc-${selectedCol}`);
  const unitField = document.getElementById(`nb-unit-${selectedCol}`);
  const typeField = document.getElementById(`nb-type-${selectedCol}`);
  const termField = document.getElementById(`nb-term-${selectedCol}`);
  const labelField = document.getElementById(`nb-label-${selectedCol}`);

  if (descField) colData.description = descField.value;
  if (unitField) colData.unit = unitField.value;
  if (typeField) colData.data_type = String(typeField.value || 'unknown').trim().toLowerCase();
  if (termField) colData.term_url = String(termField.value || '').trim() || null;
  if (labelField) colData.label = String(labelField.value || '').trim() || null;

  if (String(colData.data_type || '').toLowerCase() === 'categorical' && colData.levels) {
    Object.keys(colData.levels).forEach(levelKey => {
      const uniqueId = `nb-cat-${selectedCol}-${levelKey}`;
      const lvlLabelField = document.getElementById(`${uniqueId}-label`);
      const lvlDescField = document.getElementById(`${uniqueId}-desc`);

      if (lvlLabelField) {
        colData.levels[levelKey].label = lvlLabelField.value || levelKey;
      }
      if (lvlDescField) {
        colData.levels[levelKey].description = lvlDescField.value;
      }
    });
  }
};

window.ensureCategoricalLevelsFromObserved = function(colName, colData) {
  if (!colData || String(colData.data_type || '').toLowerCase() !== 'categorical') {
    return;
  }

  if (!colData.levels || typeof colData.levels !== 'object') {
    colData.levels = {};
  }

  const mapping = window.getNeurobagelMappingForColumn(colData);
  if (mapping && mapping.levels) {
    // Normalize existing keys first (e.g., 2 -> L) before adding observed aliases.
    window.canonicalizeCategoricalLevels(colData, mapping);
  }

  const observedValues = (window.participantsTsvData && Array.isArray(window.participantsTsvData[colName]))
    ? window.participantsTsvData[colName]
    : [];

  observedValues.forEach(v => {
    const sourceKey = String(v ?? '').trim();
    if (!sourceKey) return;
    if (!colData.levels[sourceKey]) {
      // Enrich from vocab but preserve source key as-is.
      const canonicalKey = mapping && mapping.levels
        ? window.resolveCanonicalLevelKey(mapping, sourceKey, { label: sourceKey })
        : null;
      const mappingLevel = canonicalKey && mapping.levels[canonicalKey] ? mapping.levels[canonicalKey] : null;
      colData.levels[sourceKey] = {
        label: (mappingLevel && mappingLevel.label) || sourceKey,
        description: '',
        uri: (mappingLevel && mappingLevel.uri) || null,
      };
    }
  });
};

window.autoMatchNeurobagelConcepts = function() {
  const allColumns = window.neurobagelWidgetState.allColumns;
  let matches = 0;
  
  for (const [colName, colData] of Object.entries(allColumns)) {
    const lowerName = colName.toLowerCase();
    let bestMatch = null;
    
    // Fuzzy match logic
    if (lowerName === 'sex' || lowerName === 'gender') bestMatch = 'Sex';
    else if (lowerName === 'age' || lowerName === 'years') bestMatch = 'Age';
    else if (lowerName === 'handedness' || lowerName === 'hand') bestMatch = 'Handedness';
    else if (lowerName === 'education' || lowerName === 'education_level' || lowerName === 'edu') bestMatch = 'Education';
    else if (lowerName === 'group' || lowerName === 'diagnosis' || lowerName === 'dx' || lowerName === 'pheno_group') bestMatch = 'Diagnosis';
    else if (lowerName === 'participant_id' || lowerName === 'subject_id' || lowerName === 'id') bestMatch = 'ParticipantID';
    else if (lowerName === 'session_id' || lowerName === 'session') bestMatch = 'SessionID';
    
    if (bestMatch && !colData.standardized_variable) {
      const mapping = window.neurobagelCommonMappings[bestMatch];
      colData.standardized_variable = mapping.standardized_variable;
      colData.term_url = mapping.term_url;
      colData.label = bestMatch;
      if (mapping.data_type) colData.data_type = mapping.data_type;
      if (mapping.levels && colData.levels) {
          // Quick level match
          for (const [k, v] of Object.entries(mapping.levels)) {
              if (colData.levels[k]) {
                  colData.levels[k].label = v.label;
                  colData.levels[k].uri = v.uri;
              }
          }
      }
      matches++;
    }
  }
  
  if (matches > 0) {
    alert(`Auto-matched ${matches} concepts!`);
    window.renderNeurobagelWidget();
  } else {
    alert("No obvious matches found based on column names.");
  }
};

// Auto-detect data type for custom columns based on TSV values
window.autoDetectDataType = function(colName, uniqueValues) {
  if (!uniqueValues || uniqueValues.length === 0) {
    return 'text';
  }

  // Rule 0: Date/time-like columns should be text (not categorical)
  const lowerName = String(colName || '').toLowerCase();
  const hasDateNameHint = ['date', 'time', 'timestamp', 'datetime'].some(token => lowerName.includes(token));
  const dateLikeRegex = /^(\d{1,2}[./-]\d{1,2}[./-]\d{2,4}|\d{4}[./-]\d{1,2}[./-]\d{1,2})(\s+\d{1,2}:\d{2}(:\d{2})?)?$/;
  const dateLikeCount = uniqueValues.filter(v => {
    const s = String(v ?? '').trim();
    if (!s) return false;
    if (dateLikeRegex.test(s)) return true;
    const parsed = Date.parse(s);
    return !Number.isNaN(parsed);
  }).length;
  if (hasDateNameHint || (dateLikeCount / uniqueValues.length) > 0.6) {
    return 'text';
  }
  
  // Rule 1: If <= 10 unique values, treat as categorical
  if (uniqueValues.length <= 10) {
    // Additional check: make sure they're not all numbers with different values
    const allNumeric = uniqueValues.every(v => !isNaN(v) && v !== '');
    if (allNumeric) {
      // If all numeric and > 5 unique values, could be continuous
      // But if they look like IDs or codes, keep as categorical
      const numericValues = uniqueValues.map(Number).sort((a, b) => a - b);
      const range = numericValues[numericValues.length - 1] - numericValues[0];
      const step = range > 0 ? range / (numericValues.length - 1) : 0;
      
      // If values are evenly spaced (like ages: 20, 21, 22...), likely continuous
      // If they're sparse or with gaps, likely codes/categories
      const isEvenlySpaced = numericValues.every((val, idx, arr) => {
        if (idx === 0) return true;
        const expectedDiff = step;
        const actualDiff = val - arr[idx - 1];
        return Math.abs(actualDiff - expectedDiff) < 1;
      });
      
      if (isEvenlySpaced && range > 5) {
        return 'continuous';
      }
    }
    
    return 'categorical';
  }
  
  // Rule 2: If > 10 unique values, likely continuous or text
  // Check if mostly numeric
  const numericCount = uniqueValues.filter(v => !isNaN(v) && v !== '').length;
  if (numericCount / uniqueValues.length > 0.8) {
    return 'continuous';
  }
  
  return 'text';
};

// Fetch NeuroBagel participants dictionary from API
window.fetchNeurobagelParticipants = async function() {
  console.log('📡 Fetching NeuroBagel participants data...');
  try {
    const response = await fetch('/api/neurobagel/participants');
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: ${response.statusText}`);
    }
    const data = await response.json();
    console.log('✅ Successfully fetched NeuroBagel data');
    return data;
  } catch (error) {
    console.error('❌ Failed to fetch NeuroBagel data:', error);
    // Return empty structure to allow widget to continue
    return { properties: {} };
  }
};

window.renderNeurobagelWidget = async function() {
  console.log('🧠 renderNeurobagelWidget called');
  const data = await window.fetchNeurobagelParticipants();
  console.log('🧠 Fetched data:', data);
  if (!data || !data.properties) {
    console.warn('❌ No NeuroBagel data for widget');
    return;
  }
  console.log('✅ Data has properties:', Object.keys(data.properties).length, 'columns');
  
  // Merge TSV unique values with NeuroBagel data for categorical columns
  const enrichedData = data.properties;
  if (window.participantsTsvData) {
    console.log('🔄 Merging TSV unique values with NeuroBagel data');
    for (const [colName, colData] of Object.entries(enrichedData)) {
      if (colData.data_type === 'categorical' && window.participantsTsvData[colName]) {
        const uniqueValues = window.participantsTsvData[colName];
        console.log(`📊 Column ${colName} - TSV values:`, uniqueValues);
        
        // If backend already provided enriched levels (with SNOMED codes), preserve them
        // Only add missing TSV values that aren't already defined
        if (!colData.levels) {
          colData.levels = {};
        }
        
        // Add TSV values as levels, but PRESERVE existing enriched data from backend
        uniqueValues.forEach(value => {
          if (!colData.levels[value]) {
            // Only add if not already enriched by backend
            colData.levels[value] = {
              label: value,
              description: '',
              uri: null
            };
          }
          // If already exists from backend, keep it (it has SNOMED codes!)
        });
        
        console.log(`✅ Merged ${colName} with ${Object.keys(colData.levels).length} categorical levels (${uniqueValues.length} from TSV)`);

        // Normalize to canonical keys immediately when we can resolve a mapping.
        const mapping = window.getNeurobagelMappingForColumn(colData);
        if (mapping && mapping.levels) {
          window.canonicalizeCategoricalLevels(colData, mapping);
        }
      }
    }
    
    // Auto-detect data types for custom columns in TSV (not in NeuroBagel)
    for (const [colName, uniqueValues] of Object.entries(window.participantsTsvData)) {
      if (!enrichedData[colName]) {
        // This is a custom column not in NeuroBagel
        const detectedType = window.autoDetectDataType(colName, uniqueValues);
        console.log(`🔍 Auto-detected data type for custom column ${colName}:`, detectedType);
        
        enrichedData[colName] = {
          description: `Column: ${colName}`,
          data_type: detectedType,
          standardized_variable: null
        };
        
        // If detected as categorical, add levels from TSV
        if (detectedType === 'categorical') {
          enrichedData[colName].levels = {};
          uniqueValues.forEach(value => {
            enrichedData[colName].levels[value] = {
              label: value,
              description: '',
              uri: null
            };
          });
          console.log(`📊 Custom column ${colName} - added ${uniqueValues.length} categorical levels`);
        }
      }
    }
  } else {
    console.log('ℹ️ No TSV data available - using NeuroBagel defaults only');
  }
  
  // Merge existing participants.json data if available
  if (window.existingParticipantsData) {
    console.log('🔄 Merging existing participants.json data into widget');
    for (const [colName, colMeta] of Object.entries(window.existingParticipantsData)) {
      if (!enrichedData[colName]) {
        // Add columns that exist in JSON but not in standard NeuroBagel/TSV
        enrichedData[colName] = {
          description: colMeta.Description || '',
          data_type: 'unknown',
          standardized_variable: null
        };
      }
      
      // Update with existing metadata
      if (colMeta.Description) enrichedData[colName].description = colMeta.Description;
      if (colMeta.Units) enrichedData[colName].unit = colMeta.Units;
      
      // NEUROBAGEL ENRICHMENT: Load existing annotations — only for known NB concepts.
      // Synthetic "nb:<colname>" entries written by earlier saves must not be restored.
      let explicitVariableType = null;
      if (colMeta.Annotations) {
        if (colMeta.Annotations.IsAbout) {
          const storedTermUrl = String(colMeta.Annotations.IsAbout.TermURL || '').trim();
          const storedLabel = String(colMeta.Annotations.IsAbout.Label || '').trim();
          const isKnown = Object.values(window.neurobagelCommonMappings || {}).some(m => m && (
            (storedTermUrl && String(m.term_url || '').trim().toLowerCase() === storedTermUrl.toLowerCase()) ||
            (storedLabel && String(m.standardized_variable || '').trim().toLowerCase() === storedLabel.toLowerCase())
          ));
          if (isKnown) {
            enrichedData[colName].term_url = storedTermUrl || null;
            enrichedData[colName].label = storedLabel || null;
            // Reverse-lookup the canonical standardized_variable from the known mappings
            // rather than lowercasing the label (which produces "participantid" instead of "participant_id").
            const matched = Object.values(window.neurobagelCommonMappings || {}).find(m => m && (
              (storedTermUrl && String(m.term_url || '').trim().toLowerCase() === storedTermUrl.toLowerCase()) ||
              (storedLabel && String(m.standardized_variable || '').trim().toLowerCase() === storedLabel.toLowerCase())
            ));
            if (matched) {
              enrichedData[colName].standardized_variable = matched.standardized_variable;
            }
          }
        }
        if (colMeta.Annotations.VariableType) {
          explicitVariableType = String(colMeta.Annotations.VariableType || '').toLowerCase();
          enrichedData[colName].data_type = explicitVariableType;
        }
      }
      
      // Keep legacy Levels only when variable is explicitly categorical (or no explicit type exists).
      const shouldApplyLevels = !explicitVariableType || explicitVariableType === 'categorical';
      if (colMeta.Levels && shouldApplyLevels) {
        enrichedData[colName].data_type = 'categorical';
        if (!enrichedData[colName].levels) enrichedData[colName].levels = {};
        
        for (const [levelKey, levelLabel] of Object.entries(colMeta.Levels)) {
          if (!enrichedData[colName].levels[levelKey]) {
            enrichedData[colName].levels[levelKey] = {
              label: levelLabel,
              description: '',
              uri: (colMeta.Annotations && colMeta.Annotations.Levels && colMeta.Annotations.Levels[levelKey]) ? colMeta.Annotations.Levels[levelKey].TermURL : null
            };
          } else {
            enrichedData[colName].levels[levelKey].label = levelLabel;
            if (colMeta.Annotations && colMeta.Annotations.Levels && colMeta.Annotations.Levels[levelKey]) {
                enrichedData[colName].levels[levelKey].uri = colMeta.Annotations.Levels[levelKey].TermURL;
            }
          }
        }
      }
    }
  }

  // Reconcile type using current TSV evidence (preview/local), so stale schema text
  // types do not override clear categorical columns like education_level/sleep codes.
  if (window.participantsTsvData) {
    for (const [colName, uniqueValues] of Object.entries(window.participantsTsvData)) {
      if (!enrichedData[colName]) continue;
      const inferred = window.autoDetectDataType(colName, uniqueValues);
      const currentType = (enrichedData[colName].data_type || '').toLowerCase();

      if (inferred === 'categorical' && (currentType === 'text' || currentType === 'string' || currentType === 'unknown' || !currentType)) {
        enrichedData[colName].data_type = 'categorical';
        if (!enrichedData[colName].levels) {
          enrichedData[colName].levels = {};
        }
        uniqueValues.forEach(value => {
          if (!enrichedData[colName].levels[value]) {
            enrichedData[colName].levels[value] = {
              label: value,
              description: '',
              uri: null
            };
          }
        });
      }
    }
  }
  
  window.neurobagelWidgetState.allColumns = enrichedData;
  
  // Render the sidebar
  window.renderNeurobagelSidebar();
  
  // Force widget to be visible
  const widgetContent = document.getElementById('neurobagelWidgetContent');
  if (widgetContent) {
    widgetContent.style.display = 'flex';
    console.log('✅ Widget content display set to flex');
  }
  
  console.log('✅ renderNeurobagelWidget completed successfully');
};

// Render just the sidebar (preserves enriched data, doesn't re-fetch)
window.renderNeurobagelSidebar = function() {
  console.log('🔄 Rendering sidebar from existing state');
  const enrichedData = window.neurobagelWidgetState.allColumns;
  if (!enrichedData) {
    console.error('❌ No allColumns state to render sidebar from');
    return;
  }

  const hasNeurobagelAnnotation = (colData) => {
    if (!colData || typeof colData !== 'object') return false;
    // Only mark as NeuroBagel-annotated when mapped to a known NeuroBagel concept.
    // Check both standardized_variable AND term_url — do not short-circuit on sv alone
    // because a stale/lowercased sv (e.g. "participantid") may not match while the
    // term_url (e.g. "nb:ParticipantID") still does.
    const sv = String(colData.standardized_variable || '').trim().toLowerCase();
    const tu = String(colData.term_url || '').trim().toLowerCase();
    if (!sv && !tu) return false;
    return Object.values(window.neurobagelCommonMappings || {}).some(m => {
      if (!m) return false;
      if (sv && String(m.standardized_variable || '').trim().toLowerCase() === sv) return true;
      if (tu && String(m.term_url || '').trim().toLowerCase() === tu) return true;
      return false;
    });
  };

  const createSidebarItem = (colName, colData) => {
    const item = document.createElement('div');
    const dataType = colData && colData.data_type ? colData.data_type : 'unknown';
    const annotatedBadge = hasNeurobagelAnnotation(colData)
      ? '<span class="nb-badge-annotated" title="NeuroBagel annotated">NB</span>'
      : '';

    item.className = 'nb-column-item';
    item.innerHTML = `
      <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
        <span>${colName}</span>
        <span class="nb-column-item-meta">
          ${annotatedBadge}
          <span class="nb-column-item-type">${dataType}</span>
        </span>
      </div>
    `;
    item.onclick = (evt) => window.selectNeurobagelColumn(colName, evt.currentTarget);
    return item;
  };

  // Categorize columns into AVAILABLE (present in participants columns)
  const tsvColumns = window.participantsTsvData ? Object.keys(window.participantsTsvData) : [];
  const available = {};  // Columns in participants preview/local columns
  
  for (const [colName, colData] of Object.entries(enrichedData)) {
    // Case-insensitive match for BIDS columns (e.g., participant_id vs ParticipantID)
    const colNameLower = colName.toLowerCase().replace(/_/g, '');
    const matchedTsvColumn = tsvColumns.find(c => {
        const cLower = c.toLowerCase().replace(/_/g, '');
        return cLower === colNameLower || cLower === colName.toLowerCase();
    });

    if (matchedTsvColumn) {
      available[matchedTsvColumn] = colData;
    }
  }
  
  console.log('📊 Available columns (in TSV):', Object.keys(available));
  
  // Render sidebar
  const sidebar = document.getElementById('neurobagelSidebar');
  if (!sidebar) {
    console.error('❌ neurobagelSidebar element not found!');
    return;
  }
  sidebar.innerHTML = '';
  
  // AVAILABLE section - split into NeuroBagel harmonized and custom variables
  if (Object.keys(available).length > 0) {
    const availableSection = document.createElement('div');
    availableSection.style.marginBottom = '16px';
    
    const availableTitle = document.createElement('div');
    availableTitle.className = 'nb-section-title';
    availableTitle.style.marginTop = '0';
    availableTitle.textContent = '✓ Available';
    availableSection.appendChild(availableTitle);
    
    // Separate into harmonized (has standardized_variable) and custom
    const harmonized = {};
    const custom = {};
    
    for (const [colName, colData] of Object.entries(available)) {
      if (colData.standardized_variable) {
        harmonized[colName] = colData;
      } else {
        custom[colName] = colData;
      }
    }
    
    // Render NeuroBagel Harmonized subsection
    if (Object.keys(harmonized).length > 0) {
      const harmonizedSubtitle = document.createElement('div');
      harmonizedSubtitle.style.fontSize = '11px';
      harmonizedSubtitle.style.fontWeight = '600';
      harmonizedSubtitle.style.color = '#0d6efd';
      harmonizedSubtitle.style.marginTop = '8px';
      harmonizedSubtitle.style.marginBottom = '4px';
      harmonizedSubtitle.style.paddingLeft = '4px';
      harmonizedSubtitle.textContent = '🔷 NEUROBAGEL HARMONIZED';
      availableSection.appendChild(harmonizedSubtitle);
      
      for (const [colName, colData] of Object.entries(harmonized)) {
        availableSection.appendChild(createSidebarItem(colName, colData));
      }
    }
    
    // Render Custom Variables subsection
    if (Object.keys(custom).length > 0) {
      const customSubtitle = document.createElement('div');
      customSubtitle.style.fontSize = '11px';
      customSubtitle.style.fontWeight = '600';
      customSubtitle.style.color = '#6c757d';
      customSubtitle.style.marginTop = '12px';
      customSubtitle.style.marginBottom = '4px';
      customSubtitle.style.paddingLeft = '4px';
      customSubtitle.textContent = '📋 CUSTOM VARIABLES';
      availableSection.appendChild(customSubtitle);
      
      for (const [colName, colData] of Object.entries(custom)) {
        availableSection.appendChild(createSidebarItem(colName, colData));
      }
    }
    
    sidebar.appendChild(availableSection);
  }
  
  console.log('✅ Sidebar rendered successfully');
};

      <div class="nb-field-group">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
          <div class="nb-field-label" style="margin-bottom: 0;">Categorical Levels</div>
          <button
            type="button"
            class="nb-btn"
            style="padding: 4px 8px; font-size: 11px;"
            onclick="window.addNeurobagelLevel('${colName}')"
          >
            Add Level
          </button>
        </div>
        <div class="nb-value-list">
    `;
    
    for (const [levelKey, levelData] of Object.entries(colData.levels)) {
      const description = levelData.description || '';
      const uniqueId = `nb-cat-${colName}-${levelKey}`;
      // Only pre-select if the user explicitly set a mapping via the dropdown.
      // Do not auto-select via alias resolution (that would imply recoding).
      const selectedCanonicalKey = (colData.level_key_mappings && colData.level_key_mappings[levelKey])
        ? String(colData.level_key_mappings[levelKey] || '').trim()
        : '';
      const canonicalSelector = canonicalOptions.length > 0
        ? `
          <div style="display: grid; grid-template-columns: 150px 1fr; gap: 8px; align-items: center; margin-top: 8px;">
            <label for="${uniqueId}-canonical" style="font-size: 11px; color: #666; margin: 0;">NeuroBagel Harmonize To</label>
            <select
              class="nb-canonical-key-select"
              id="${uniqueId}-canonical"
              data-col-name="${colName}"
              data-level-key="${levelKey}"
              style="padding: 4px 8px; border: 1px solid #ccc; border-radius: 3px; font-size: 12px;"
            >
              <option value="">Keep dataset code</option>
              ${canonicalOptions.map(option => `<option value="${option.key}" ${selectedCanonicalKey === option.key ? 'selected' : ''}>${option.label}</option>`).join('')}
            </select>
          </div>
        `
        : '';
      
      html += `
        <div class="nb-categorical-item" style="border: 1px solid #ddd; border-radius: 4px; padding: 10px; margin-bottom: 8px; background: #fff;">
          <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 8px;">
            <span style="font-weight: 600; min-width: 60px; padding: 4px 8px; background: #e7f1ff; border-radius: 4px; font-size: 12px;">${levelKey}</span>
            <span style="color: #666; font-size: 12px;">→</span>
            <input 
              type="text" 
              class="nb-categorical-label" 
              id="${uniqueId}-label" 
              placeholder="Label (e.g., Healthy Controls)"
              value="${levelData.label || levelKey}"
              style="flex: 1; padding: 4px 8px; border: 1px solid #ccc; border-radius: 3px; font-size: 12px;"
            />
            <button
              type="button"
              class="nb-btn nb-level-delete"
              data-col-name="${colName}"
              data-level-key="${levelKey}"
              style="padding: 4px 8px; font-size: 11px;"
            >
              Remove
            </button>
          </div>
          <textarea 
            class="nb-categorical-desc" 
            id="${uniqueId}-desc" 
            placeholder="Description (e.g., Healthy control group)"
            style="width: 100%; height: 40px; padding: 6px; border: 1px solid #ccc; border-radius: 3px; font-size: 12px;"
          >${description}</textarea>
          ${canonicalSelector}
          ${levelData.uri ? `<div style="margin-top: 6px; font-size: 11px; color: #666;">🔗 <code>${levelData.uri}</code></div>` : ''}
        </div>
      `;
    }
    
    html += `
        </div>
      </div>
    `;
  }
  
  editor.innerHTML = html;
  
  // Store edited values back to column data when user changes them
  const descField = document.getElementById(`nb-desc-${colName}`);
  const unitField = document.getElementById(`nb-unit-${colName}`);
  const typeField = document.getElementById(`nb-type-${colName}`);
  const termField = document.getElementById(`nb-term-${colName}`);
  const labelField = document.getElementById(`nb-label-${colName}`);

  function bindLiveUpdate(field, updater) {
    if (!field) return;
    field.addEventListener('change', updater);
    field.addEventListener('input', updater);
  }
  
  bindLiveUpdate(descField, function() {
      colData.description = this.value;
      console.log(`Updated description for ${colName}:`, this.value);
  });
  
  bindLiveUpdate(unitField, function() {
      colData.unit = this.value;
      console.log(`Updated unit for ${colName}:`, this.value);
  });

  bindLiveUpdate(typeField, function() {
      const nextType = String(this.value || 'unknown').trim().toLowerCase();
      colData.data_type = nextType;

      if (nextType === 'categorical') {
        window.ensureCategoricalLevelsFromObserved(colName, colData);
      }

      window.renderNeurobagelEditor(colName, colData);
      window.renderNeurobagelSidebar();
  });

  bindLiveUpdate(termField, function() {
      colData.term_url = String(this.value || '').trim() || null;
      window.renderNeurobagelSidebar();
  });

  bindLiveUpdate(labelField, function() {
      colData.label = String(this.value || '').trim() || null;
      window.renderNeurobagelSidebar();
  });
  
  // Add listeners for categorical level edits
  if (dataType === 'categorical') {
    for (const levelKey of Object.keys(colData.levels)) {
      const uniqueId = `nb-cat-${colName}-${levelKey}`;
      const labelField = document.getElementById(`${uniqueId}-label`);
      const descField = document.getElementById(`${uniqueId}-desc`);
      
      bindLiveUpdate(labelField, function() {
          colData.levels[levelKey].label = this.value || levelKey;
          console.log(`Updated label for ${colName}/${levelKey}:`, this.value);
      });
      
      bindLiveUpdate(descField, function() {
          colData.levels[levelKey].description = this.value;
          console.log(`Updated description for ${colName}/${levelKey}:`, this.value);
      });
    }

    const deleteButtons = editor.querySelectorAll('.nb-level-delete');
    deleteButtons.forEach(btn => {
      btn.addEventListener('click', function() {
        const targetCol = this.getAttribute('data-col-name');
        const targetLevel = this.getAttribute('data-level-key');
        const targetColData = window.neurobagelWidgetState.allColumns[targetCol];
        if (!targetColData || !targetColData.levels || !Object.prototype.hasOwnProperty.call(targetColData.levels, targetLevel)) {
          return;
        }

        delete targetColData.levels[targetLevel];
        window.renderNeurobagelEditor(targetCol, targetColData);
        window.renderNeurobagelSidebar();
      });
    });

    const canonicalSelectors = editor.querySelectorAll('.nb-canonical-key-select');
    canonicalSelectors.forEach(select => {
      select.addEventListener('change', function() {
        const targetCol = this.getAttribute('data-col-name');
        const sourceLevel = this.getAttribute('data-level-key');
        const canonicalKey = String(this.value || '').trim();
        const targetColData = window.neurobagelWidgetState?.allColumns?.[targetCol];
        if (!targetColData || !targetColData.levels || !Object.prototype.hasOwnProperty.call(targetColData.levels, sourceLevel)) {
          return;
        }

        if (!canonicalKey) {
          if (targetColData.level_key_mappings && typeof targetColData.level_key_mappings === 'object') {
            delete targetColData.level_key_mappings[sourceLevel];
          }
          window.renderNeurobagelEditor(targetCol, targetColData);
          window.renderNeurobagelSidebar();
          return;
        }

        window.mapObservedLevelToCanonicalKey(targetCol, sourceLevel, canonicalKey);
      });
    });
  }
};

window.applyNeurobagelLevel = function(colName, levelKey) {
  const colData = window.neurobagelWidgetState.allColumns[colName];
  const levelData = colData.levels[levelKey];
  
  // Find matching form fields and fill with level info
  const selector = `[data-json-path^="${colName}.levels.${levelKey}"]`;
  const matches = Array.from(document.querySelectorAll(selector));
  
  if (matches.length > 0) {
    const suggestion = `${levelData.label || levelKey}\nDescription: ${levelData.description}\nURI: ${levelData.uri || 'N/A'}`;
    matches.forEach(el => { el.value = suggestion; });
    if (typeof showAlert === 'function') {
      showAlert(`Applied ${colName}/${levelKey} level annotation`, 'success');
    }
  }
};

// Initialize widget when NeuroBagel data loads
document.addEventListener('DOMContentLoaded', async function() {
  // Wait for NeuroBagel data to be available
  await new Promise(resolve => setTimeout(resolve, 1000));
  await window.renderNeurobagelWidget();
  document.getElementById('neurobagelAnnotationWidget').style.display = 'block';
});
</script>
