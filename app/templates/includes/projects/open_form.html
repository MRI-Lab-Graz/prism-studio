    <!-- Open Existing Project Form -->
    <div class="form-section" id="section-open">
        <div class="card shadow-sm">
            <div class="card-header bg-primary bg-opacity-10" data-bs-toggle="collapse" data-bs-target="#openProjectSection"
                 role="button" tabindex="0" aria-expanded="false" aria-controls="openProjectSection">
                <h5 class="mb-0 d-flex justify-content-between align-items-center">
                    <span><i class="fas fa-folder-open text-primary me-2"></i>Project</span>
                    <i class="fas fa-chevron-down text-muted" id="openProjectChevron"></i>
                </h5>
            </div>
            <div class="collapse" id="openProjectSection">
            <div class="card-body">
                <div class="project-flow-strip project-flow-strip--open mb-3" id="openProjectFlowStrip">
                    <div class="project-flow-strip__item">
                        <span class="project-flow-strip__label">Use when</span>
                        <strong>You already have a <code>project.json</code> on disk</strong>
                    </div>
                    <div class="project-flow-strip__item">
                        <span class="project-flow-strip__label">Checks</span>
                        <strong>Structure, missing files, and repairable PRISM issues</strong>
                    </div>
                    <div class="project-flow-strip__item">
                        <span class="project-flow-strip__label">Result</span>
                        <strong>This project becomes the current working study in PRISM Studio</strong>
                    </div>
                </div>
                <form id="openProjectForm">
                    <div class="row g-3">
                        <div class="col-md-7">
                            <label for="existingPath" class="form-label fw-bold">
                                Select project.json
                                <i class="fas fa-info-circle text-primary ms-1" id="pathHelpTooltip" 
                                   data-bs-toggle="tooltip" data-bs-placement="top" data-bs-html="true"
                                   title="Type the full path to your project.json file, or click Browse to select it."></i>
                            </label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="existingPath"
                                       placeholder="/Users/YourName/MyProject/project.json" required>
                                <button class="btn btn-outline-secondary" type="button" id="browseExistingPath" title="Browse for project.json">
                                    <i class="fas fa-folder-open"></i> Browse
                                </button>
                            </div>
                        </div>
                        <div class="col-md-5">
                            <label class="form-label fw-bold d-none d-md-block">&nbsp;</label>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-search me-2"></i>Load Project
                            </button>
                        </div>
                    </div>

                    <div class="mt-3" id="recentProjectsBlock" style="display: none;">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label class="form-label fw-bold mb-0">Recent Projects</label>
                            <button type="button" class="btn btn-sm btn-link text-secondary p-0" id="clearRecentProjectsBtn">Clear</button>
                        </div>
                        <div id="recentProjectsList" class="d-flex flex-wrap gap-2"></div>
                    </div>
                </form>

                <!-- Validation Result -->
                <div id="validationResult" style="display: none;"></div>
            </div>
            </div>
        </div>
    </div>

<!-- Project File Browser Modal -->
<div class="modal fade" id="projectFileBrowserModal" tabindex="-1" aria-labelledby="projectFileBrowserModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="projectFileBrowserModalLabel">
                    <i class="fas fa-folder-open text-primary me-2"></i>Open Project
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-0">
                <!-- Breadcrumb / current path -->
                <div class="px-3 pt-3 pb-2 border-bottom bg-light">
                    <div class="d-flex align-items-center gap-2 flex-wrap">
                        <button class="btn btn-sm btn-outline-secondary" id="fsBrowserUp" title="Go up">
                            <i class="fas fa-arrow-up"></i>
                        </button>
                        <code class="small text-truncate flex-grow-1" id="fsBrowserCurrentPath" style="word-break:break-all;"></code>
                    </div>
                </div>
                <!-- File list -->
                <div style="min-height:260px; max-height:380px; overflow-y:auto;" id="fsBrowserList" aria-live="polite">
                    <div class="d-flex justify-content-center align-items-center h-100 py-5 text-muted">
                        <span><i class="fas fa-spinner fa-spin me-2"></i>Loading…</span>
                    </div>
                </div>
            </div>
            <div class="modal-footer justify-content-between">
                <div class="text-success small fw-semibold" id="fsBrowserSelectedHint" style="display:none;" role="status" aria-live="polite">
                    <i class="fas fa-check-circle me-1"></i><span id="fsBrowserSelectedPath"></span>
                </div>
                <div class="ms-auto d-flex gap-2">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="fsBrowserSelectBtn" disabled>
                        <i class="fas fa-check me-1"></i>Select
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
