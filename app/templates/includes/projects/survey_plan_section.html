    <!-- Survey Plan Card (shown when a project is loaded) -->
    <div class="card shadow-sm mt-4" id="surveyPlanCard" style="display: none;">
        <div class="card-header bg-info bg-opacity-10" data-bs-toggle="collapse" data-bs-target="#surveyPlanSection"
             role="button" aria-expanded="false" aria-controls="surveyPlanSection">
            <h5 class="mb-0 d-flex justify-content-between align-items-center">
                <span><i class="fas fa-layer-group text-info me-2"></i>Survey Version Plan</span>
                <i class="fas fa-chevron-down text-muted" id="surveyPlanChevron"></i>
            </h5>
        </div>
        <div class="collapse" id="surveyPlanSection">
            <div class="card-body">

                <p class="text-muted small mb-3">
                    Configure which variant of each questionnaire is used by default, and optionally override
                    per session or run. PRISM auto-discovers surveys from the library and pre-fills defaults.
                </p>

                <div id="surveyPlanAlertArea"></div>

                <!-- Header row -->
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 class="mb-0"><i class="fas fa-clipboard-list me-1 text-info"></i>Questionnaire Mapping</h6>
                    <button type="button" class="btn btn-outline-info btn-sm" id="surveyPlanRefreshBtn">
                        <i class="fas fa-sync-alt me-1"></i>Refresh detected surveys
                    </button>
                </div>

                <!-- Survey rows container -->
                <div id="surveyPlanRows">
                    <div class="text-muted text-center py-3" id="surveyPlanEmpty">
                        <i class="fas fa-search me-1"></i>No surveys detected yet. Click <strong>Refresh</strong> to scan the library.
                    </div>
                </div>

                <!-- Save button -->
                <div class="mt-3 d-flex justify-content-end">
                    <button type="button" class="btn btn-info" id="surveyPlanSaveBtn">
                        <i class="fas fa-save me-1"></i>Save Survey Plan
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- Survey Plan row template (cloned by JS) -->
    <template id="surveyPlanRowTemplate">
        <div class="survey-plan-row border rounded p-3 mb-2" data-task-name="">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <div>
                    <strong class="survey-plan-task-label"></strong>
                    <small class="text-muted ms-2 survey-plan-filename"></small>
                </div>
                <button type="button" class="btn btn-sm btn-outline-secondary survey-plan-toggle-overrides">
                    <i class="fas fa-sliders-h me-1"></i>Session / Run overrides
                </button>
            </div>

            <!-- Default version -->
            <div class="row g-2 align-items-center mb-2">
                <div class="col-auto">
                    <label class="form-label mb-0 fw-semibold small">Default version</label>
                </div>
                <div class="col-auto">
                    <select class="form-select form-select-sm survey-plan-default-version" style="min-width:160px;"></select>
                </div>
            </div>

            <!-- Session overrides (hidden by default) -->
            <div class="survey-plan-overrides" style="display:none;">
                <div class="row g-2 mt-1">
                    <!-- by_session -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold small">Session overrides</label>
                        <div class="survey-plan-session-rows"></div>
                        <button type="button" class="btn btn-sm btn-outline-secondary mt-1 survey-plan-add-session">
                            <i class="fas fa-plus me-1"></i>Add session
                        </button>
                    </div>
                    <!-- by_run -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold small">Run overrides</label>
                        <div class="survey-plan-run-rows"></div>
                        <button type="button" class="btn btn-sm btn-outline-secondary mt-1 survey-plan-add-run">
                            <i class="fas fa-plus me-1"></i>Add run
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Override row sub-template -->
    <template id="surveyPlanOverrideRowTemplate">
        <div class="input-group input-group-sm mb-1 survey-plan-override-row">
            <input type="text" class="form-control override-key" placeholder="e.g. ses-02">
            <select class="form-select override-version" style="min-width:130px;"></select>
            <button class="btn btn-outline-danger survey-plan-remove-override" type="button">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </template>
