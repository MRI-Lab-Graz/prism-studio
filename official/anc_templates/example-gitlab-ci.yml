# Example GitLab CI/CD Pipeline for AND Dataset Validation
#
# This file is a TEMPLATE. To use it in your exported dataset:
# 1. Copy this file to your dataset root as `.gitlab-ci.yml`
# 2. Customize the stages and jobs as needed
# 3. Push to your GitLab repository
#
# Generated by PRISM Studio AND Export

stages:
  - format
  - validate
  - publish

variables:
  # Tag of ghcr.io/mri-lab-graz/prism-validator to pin (a released version,
  # "latest", or "main"). Used directly below - keep this in sync if you
  # bump it.
  PRISM_VALIDATOR_IMAGE_TAG: "latest"
  BIDS_VALIDATOR_VERSION: "1.14.13"

# ============================================================================
# BIDS Validation
# ============================================================================

validate_bids:
  stage: validate
  image: node:18-slim
  before_script:
    - npm install -g bids-validator@${BIDS_VALIDATOR_VERSION}
  script:
    - echo "Running BIDS validator..."
    - bids-validator . --config .bids-validator-config.json --verbose
  artifacts:
    when: always
    paths:
      - bids-validator.log
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - master

validate_prism:
  stage: validate
  # GitLab CI can't consume a GitHub composite Action (see action.yml in
  # https://github.com/MRI-Lab-Graz/prism-studio), so this runs the same
  # published Docker image directly instead.
  image: docker:27
  services:
    - docker:27-dind
  script:
    - echo "Running PRISM validator..."
    - docker pull "ghcr.io/mri-lab-graz/prism-validator:${PRISM_VALIDATOR_IMAGE_TAG}"
    - docker run --rm -v "$(pwd)":/data:ro "ghcr.io/mri-lab-graz/prism-validator:${PRISM_VALIDATOR_IMAGE_TAG}" /data --format markdown > prism_validation_report.md
    - cat prism_validation_report.md
  artifacts:
    when: always
    paths:
      - prism_validation_report.md
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - master

