name: Build Application

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Allows manual triggering

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build for ${{ matrix.platform_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform_name: MacOS Apple Silicon
            artifact_name: prism-studio-macOS-AppleSilicon
            asset_name: prism-studio-macOS-AppleSilicon.zip
            target_arch: arm64
            python_arch: arm64
            python_version: '3.10'
            bundle_executable: dist/PrismStudio.app/Contents/MacOS/PrismStudio
          - os: macos-15
            platform_name: MacOS Intel
            artifact_name: prism-studio-macOS-AppleIntel
            asset_name: prism-studio-macOS-AppleIntel.zip
            target_arch: x86_64
            python_arch: x64
            python_version: '3.10.19'
            bundle_executable: dist/PrismStudio.app/Contents/MacOS/PrismStudio
          - os: windows-latest
            platform_name: Windows
            artifact_name: prism-studio-Windows
            asset_name: prism-studio-Windows.zip
            python_arch: x64
            python_version: '3.10'
            bundle_executable: dist/PrismStudio/PrismStudio.exe
          - os: ubuntu-latest
            platform_name: Linux
            artifact_name: prism-studio-Linux
            asset_name: prism-studio-Linux.zip
            python_arch: x64
            python_version: '3.10'
            bundle_executable: dist/PrismStudio/PrismStudio

    steps:
    - uses: actions/checkout@v5

    - name: Prepare Intel macOS runtime dependencies
      if: runner.os == 'macOS' && matrix.target_arch == 'x86_64'
      run: |
        sudo softwareupdate --install-rosetta --agree-to-license || true
        if [ ! -x /usr/local/bin/brew ]; then
          NONINTERACTIVE=1 arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
        fi
        arch -x86_64 /usr/local/bin/brew update
        arch -x86_64 /usr/local/bin/brew install gettext openssl@3
        test -f /usr/local/opt/gettext/lib/libintl.8.dylib
        test -f /usr/local/opt/openssl@3/lib/libssl.3.dylib
        echo "DYLD_FALLBACK_LIBRARY_PATH=/usr/local/opt/openssl@3/lib:/usr/local/opt/gettext/lib:${DYLD_FALLBACK_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python_version }}
        architecture: ${{ matrix.python_arch }}

    - name: Install dependencies (Intel macOS)
      if: runner.os == 'macOS' && matrix.target_arch == 'x86_64'
      run: |
        arch -x86_64 python -m pip install --upgrade pip
        arch -x86_64 python -m pip install -r requirements-runtime.txt
        arch -x86_64 python -m pip install -r requirements-build.txt

    - name: Install dependencies
      if: runner.os != 'macOS' || matrix.target_arch != 'x86_64'
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements-runtime.txt
        python -m pip install -r requirements-build.txt

    - name: Create survey_library directory
      run: |
        mkdir -p survey_library || mkdir survey_library
      shell: bash

    - name: Build with PyInstaller (Intel macOS)
      if: runner.os == 'macOS' && matrix.target_arch == 'x86_64'
      run: |
        arch -x86_64 python scripts/build/build_app.py --name PrismStudio --target-arch x86_64

    - name: Build with PyInstaller
      if: runner.os != 'macOS' || matrix.target_arch != 'x86_64'
      run: |
        python scripts/build/build_app.py --name PrismStudio ${{ matrix.target_arch && format('--target-arch {0}', matrix.target_arch) || '' }}

    - name: Smoke test bundled imports (Windows)
      if: runner.os == 'Windows'
      run: |
        python scripts/ci/smoke_bundle_imports.py --bundle-root dist/PrismStudio/_internal

    - name: Smoke test bundled imports (macOS)
      if: runner.os == 'macOS'
      run: |
        python scripts/ci/smoke_bundle_imports.py --bundle-root dist/PrismStudio.app/Contents/Resources

    - name: Verify macOS bundle signature after smoke test
      if: runner.os == 'macOS'
      run: |
        codesign --verify --deep --strict dist/PrismStudio.app
        echo "Bundle signature intact after smoke test"

    - name: Smoke test packaged web app
      run: |
        python scripts/ci/smoke_packaged_web_app.py --app-path ${{ matrix.bundle_executable }} --probe-path /projects --probe-path / --probe-path /converter --require-pyreadstat-write-support

    # Windows Code Signing (Free for Open Source via SignPath)
    - name: Sign Windows Executable
      if: runner.os == 'Windows' && env.SIGNPATH_API_TOKEN != ''
      env:
        SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
      uses: signpath/github-action-submit-signing-request@v0.3
      with:
        api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
        organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
        project-slug: 'prism-validator'
        signing-policy-slug: 'release-signing'
        artifact-configuration-slug: 'windows-executable'
        input-artifact-path: 'dist/PrismStudio/PrismStudio.exe'
        output-artifact-path: 'dist/PrismStudio/PrismStudio.exe'
        wait-for-completion: true

    # Verify Windows Signature
    - name: Verify Windows Signature
      if: runner.os == 'Windows' && env.SIGNPATH_API_TOKEN != ''
      run: |
        $sig = Get-AuthenticodeSignature "dist\PrismStudio\PrismStudio.exe"
        Write-Output "Signature Status: $($sig.Status)"
        if ($sig.Status -ne 'Valid') {
          Write-Error "Signature invalid: $($sig.Status)"
          exit 1
        }

    # Windows Zip
    - name: Zip Windows App
      if: runner.os == 'Windows'
      run: |
        powershell Compress-Archive -Path dist\PrismStudio -DestinationPath ${{ matrix.asset_name }}

    # macOS Zip
    - name: Zip macOS App
      if: runner.os == 'macOS'
      run: |
        RELEASE_DIR="${{ matrix.asset_name }}"
        RELEASE_DIR="${RELEASE_DIR%.zip}"
        rm -rf "dist/${RELEASE_DIR}"
        mkdir -p "dist/${RELEASE_DIR}"
        cp -R dist/PrismStudio.app "dist/${RELEASE_DIR}/"
        cp scripts/release/macos_first_run.command "dist/${RELEASE_DIR}/Open Prism Studio.command"
        chmod +x "dist/${RELEASE_DIR}/Open Prism Studio.command"
        osacompile -o "dist/${RELEASE_DIR}/Prism Studio Installer.app" scripts/release/open_prism_studio_launcher.applescript
        codesign --force --deep --sign - "dist/${RELEASE_DIR}/Prism Studio Installer.app" || true
        cat > "dist/${RELEASE_DIR}/README_FIRST_RUN.txt" << 'EOF'
        Prism Studio macOS first launch

        If macOS blocks the app on first launch, run:
          Prism Studio Installer.app

        Alternative:
          Open Prism Studio.command

        The launcher checks quarantine state:
        - First time (quarantined): runs the fix and opens PrismStudio.app
        - Later launches: opens PrismStudio.app directly

        The command helper always runs the fix, then opens PrismStudio.app.

        Why this is needed:
        - The app is currently unsigned/not notarized for public distribution.
        - macOS Gatekeeper can mark downloaded apps as quarantined.

        Alternative without script:
        - Right-click PrismStudio.app, choose Open, then confirm Open.

        Apple guide for "Open Anyway":
        https://support.apple.com/guide/mac-help/open-a-mac-app-from-an-unidentified-developer-mh40616/mac
        EOF
        cd dist
        ditto -c -k --sequesterRsrc --keepParent "${RELEASE_DIR}" "../${{ matrix.asset_name }}"

    # Linux Zip
    - name: Zip Linux App
      if: runner.os == 'Linux'
      run: |
        cd dist
        zip -r ../${{ matrix.asset_name }} PrismStudio

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
    - name: Download Windows Artifact
      uses: actions/download-artifact@v7
      with:
        name: prism-studio-Windows

    - name: Download macOS Apple Silicon Artifact
      uses: actions/download-artifact@v7
      with:
        name: prism-studio-macOS-AppleSilicon

    - name: Download macOS Intel Artifact
      uses: actions/download-artifact@v7
      with:
        name: prism-studio-macOS-AppleIntel

    - name: Download Linux Artifact
      uses: actions/download-artifact@v7
      with:
        name: prism-studio-Linux

    - name: Prepare release body preface
      run: |
        cat > release_body_preface.md << 'EOF'
        ## macOS First Launch

        If macOS blocks the app on first launch, open the extracted release folder and double-click:

        Prism Studio Installer.app

        If App Translocation prevents auto-detection, the installer asks you to select PrismStudio.app once.

        This helper removes quarantine metadata from PrismStudio.app and starts the app.

        Finder fallback:
        1. Right-click PrismStudio.app
        2. Click Open
        3. Confirm Open in the dialog

        Apple guide for "Open Anyway":
        https://support.apple.com/guide/mac-help/open-a-mac-app-from-an-unidentified-developer-mh40616/mac

        ---
        EOF
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        draft: false
        prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') || contains(github.ref, 'rc') }}
        generate_release_notes: true
        body_path: release_body_preface.md
        files: |
          prism-studio-Windows.zip
          prism-studio-macOS-AppleSilicon.zip
          prism-studio-macOS-AppleIntel.zip
          prism-studio-Linux.zip
